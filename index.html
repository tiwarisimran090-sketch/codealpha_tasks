<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Lexicon Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main id="appWorkspace">
    <header class="app-header">
        <h1>🌐 QuickTranslate Portal</h1>
    </header>

    <div class="input-wrapper">
        <textarea
            id="sourceText"
            placeholder="Type your text here to begin..."
        ></textarea>
    </div>

    <section class="controls-panel">
        <select id="originLanguage">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
        </select>

        <div class="direction-indicator">➡</div>

        <select id="destinationLanguage">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
        </select>
    </section>

    <button id="actionTranslateBtn">Convert Language</button>

    <section class="output-panel">
        <label>Output:</label>
        <div id="outputDisplay"></div>

        <div class="utility-buttons">
            <button id="actionCopyBtn">Copy Text</button>
            <button id="actionListenBtn">Listen 🔊</button>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
